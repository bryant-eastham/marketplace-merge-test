name: Post-merge marketplace regeneration

on:
  push:
    branches:
      - main
    paths:
      - 'plugin/**'
      - '.claude-plugin/marketplace-base.json'

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1

      - name: Generate marketplace.json
        run: python3 scripts/generate-marketplace.py

      - name: Commit and push to main
        run: |
          git add -f .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Regenerate marketplace.json"
          git config --unset-all http.https://github.com/.extraheader
          git remote set-url origin https://x-access-token:${{ secrets.GH_BYPASS_PAT }}@github.com/${{ github.repository }}
          git push
